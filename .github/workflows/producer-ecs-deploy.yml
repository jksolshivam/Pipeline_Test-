name: Deploy Producer to ECS

on:
  push:
    branches:
      - master
    paths:
      - "producer/**"
      - ".github/workflows/producer-ecs-deploy.yml"
  workflow_dispatch:

concurrency:
  group: producer-ecs-deploy
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.PRODUCER_ECR_REPOSITORY }}
  ECS_CLUSTER: ${{ vars.PRODUCER_ECS_CLUSTER }}
  ECS_SERVICE: ${{ vars.PRODUCER_ECS_SERVICE }}
  TASK_DEFINITION_FAMILY: in-app-events-Producer
  CONTAINER_NAME: in-app-events-Producer

permissions:
  contents: read

jobs:
  deploy:
    name: Build, push, and deploy producer
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Validate AWS deployment targets
        shell: bash
        run: |
          set -euo pipefail
          aws sts get-caller-identity >/dev/null
          aws ecr describe-repositories --repository-names "${ECR_REPOSITORY}" --region "${AWS_REGION}" >/dev/null
          aws ecs describe-clusters --clusters "${ECS_CLUSTER}" --region "${AWS_REGION}" --query 'clusters[0].status' --output text | grep -qx ACTIVE
          aws ecs describe-services --cluster "${ECS_CLUSTER}" --services "${ECS_SERVICE}" --region "${AWS_REGION}" --query 'services[0].status' --output text | grep -qx ACTIVE
          aws ecs describe-task-definition --task-definition "${TASK_DEFINITION_FAMILY}" --region "${AWS_REGION}" >/dev/null

      - name: Set image tag
        id: image
        run: |
          echo "uri=${{ steps.login-ecr.outputs.registry }}/${ECR_REPOSITORY}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        working-directory: ./producer
        shell: bash
        run: |
          set -euo pipefail
          docker build -t "${{ steps.image.outputs.uri }}" .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.64.1
        with:
          image-ref: ${{ steps.image.outputs.uri }}
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Push image to ECR
        shell: bash
        run: |
          set -euo pipefail
          docker push "${{ steps.image.outputs.uri }}"

      - name: Download current task definition
        shell: bash
        run: |
          set -euo pipefail
          TASK_DEF_ARN=$(aws ecs describe-task-definition \
            --task-definition "${TASK_DEFINITION_FAMILY}" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          aws ecs describe-task-definition \
            --task-definition "${TASK_DEF_ARN}" \
            --query taskDefinition \
            --output json > task-definition.json

      - name: Render task definition
        id: render-task-definition
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.image.outputs.uri }}

      - name: Enable ECS deployment rollback
        shell: bash
        run: |
          set -euo pipefail
          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" \
            --service "${ECS_SERVICE}" \
            --deployment-configuration "deploymentCircuitBreaker={enable=true,rollback=true}" \
            --no-cli-pager

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-definition.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 10
          max-retries: 3
