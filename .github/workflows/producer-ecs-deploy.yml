name: Deploy Producer to ECS

on:
  push:
    branches:
      - master
    paths:
      - "producer/**"
      - ".github/workflows/producer-ecs-deploy.yml"
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.PRODUCER_ECR_REPOSITORY }}
  ECS_CLUSTER: ${{ vars.PRODUCER_ECS_CLUSTER }}
  ECS_SERVICE: ${{ vars.PRODUCER_ECS_SERVICE }}
  TASK_DEFINITION_FAMILY: in-app-events-Producer
  CONTAINER_NAME: in-app-events-Producer

permissions:
  contents: read

jobs:
  deploy:
    name: Build, push, and deploy producer
    runs-on: ubuntu-latest
    timeout-minutes: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: image
        run: |
          echo "uri=${{ steps.login-ecr.outputs.registry }}/${ECR_REPOSITORY}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        working-directory: ./producer
        run: |
          docker build -t "${{ steps.image.outputs.uri }}" .
          docker push "${{ steps.image.outputs.uri }}"

      - name: Scan image in ECR
        run: |
          aws ecr start-image-scan \
            --repository-name "${ECR_REPOSITORY}" \
            --image-id imageTag="${GITHUB_SHA}" \
            --region "${AWS_REGION}" \
            --no-cli-pager

          aws ecr wait image-scan-complete \
            --repository-name "${ECR_REPOSITORY}" \
            --image-id imageTag="${GITHUB_SHA}" \
            --region "${AWS_REGION}" \
            --no-cli-pager

          SCAN_COUNTS=$(aws ecr describe-image-scan-findings \
            --repository-name "${ECR_REPOSITORY}" \
            --image-id imageTag="${GITHUB_SHA}" \
            --region "${AWS_REGION}" \
            --query 'imageScanFindings.findingSeverityCounts' \
            --output json)

          HIGH_COUNT=$(echo "$SCAN_COUNTS" | jq -r '.HIGH // 0')
          CRITICAL_COUNT=$(echo "$SCAN_COUNTS" | jq -r '.CRITICAL // 0')

          if [ "$HIGH_COUNT" -gt 0 ] || [ "$CRITICAL_COUNT" -gt 0 ]; then
            echo "Image scan failed: HIGH=$HIGH_COUNT CRITICAL=$CRITICAL_COUNT"
            exit 1
          fi

      - name: Download current task definition
        run: |
          TASK_DEF_ARN=$(aws ecs describe-task-definition \
            --task-definition "${TASK_DEFINITION_FAMILY}" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          aws ecs describe-task-definition \
            --task-definition "${TASK_DEF_ARN}" \
            --query taskDefinition \
            --output json > task-definition.json

      - name: Render task definition
        id: render-task-definition
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.image.outputs.uri }}

      - name: Enable ECS deployment rollback
        run: |
          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" \
            --service "${ECS_SERVICE}" \
            --deployment-configuration "deploymentCircuitBreaker={enable=true,rollback=true}" \
            --no-cli-pager

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-definition.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          max-retries: 1
          wait-for-service-stability: true
