name: Deploy Consumer to ECS

on:
  push:
    branches:
      - master
    paths:
      - "consumer/**"
      - ".github/workflows/consumer-ecs-deploy.yml"
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.CONSUMER_ECR_REPOSITORY }}
  ECS_CLUSTER: ${{ vars.CONSUMER_ECS_CLUSTER }}
  ECS_SERVICE: ${{ vars.CONSUMER_ECS_SERVICE }}
  TASK_DEFINITION_FAMILY: in-app-events-Consumer
  CONTAINER_NAME: consumer

permissions:
  contents: read

jobs:
  deploy:
    name: Build, push, and deploy consumer
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: image
        run: |
          echo "uri=${{ steps.login-ecr.outputs.registry }}/${ECR_REPOSITORY}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        working-directory: ./consumer
        run: |
          docker build -t "${{ steps.image.outputs.uri }}" .
          docker push "${{ steps.image.outputs.uri }}"

      - name: Download current task definition
        run: |
          TASK_DEF_ARN=$(aws ecs describe-task-definition \
            --task-definition "${TASK_DEFINITION_FAMILY}" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          aws ecs describe-task-definition \
            --task-definition "${TASK_DEF_ARN}" \
            --query taskDefinition \
            --output json > task-definition.json

      - name: Render task definition
        id: render-task-definition
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.image.outputs.uri }}

      - name: Enable ECS deployment rollback
        run: |
          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" \
            --service "${ECS_SERVICE}" \
            --deployment-configuration "deploymentCircuitBreaker={enable=true,rollback=true}" \
            --no-cli-pager

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-definition.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          max-retries: 1
          wait-max-delay-seconds: 15
          wait-for-service-stability: true
