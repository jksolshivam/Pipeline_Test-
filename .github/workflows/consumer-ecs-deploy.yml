name: Deploy Consumer to ECS

on:
  push:
    branches:
      - main
    paths:
      - "consumer/**"
      - ".github/workflows/consumer-ecs-deploy.yml"
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  SECRET_NAME: in-app-events-credentials
  ECR_REPOSITORY: ${{ vars.CONSUMER_ECR_REPOSITORY }}
  ECS_CLUSTER: ${{ vars.CONSUMER_ECS_CLUSTER }}
  ECS_SERVICE: ${{ vars.CONSUMER_ECS_SERVICE }}
  CONTAINER_NAME: consumer
  TASK_DEFINITION: .github/ecs/consumer-task-definition.json

permissions:
  contents: read

jobs:
  deploy:
    name: Build, push, and deploy consumer
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Enable ECS deployment rollback
        run: |
          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" \
            --service "${ECS_SERVICE}" \
            --deployment-configuration "deploymentCircuitBreaker={enable=true,rollback=true}" \
            --no-cli-pager

      - name: Set image tag
        id: image
        run: |
          echo "uri=${{ steps.login-ecr.outputs.registry }}/${ECR_REPOSITORY}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Prepare task definition
        id: task-def
        run: |
          jq --arg aws_region "${AWS_REGION}" \
            '.containerDefinitions |= map(
              if .name == env.CONTAINER_NAME then
                .environment |= map(
                  if .name == "AWS_REGION" then .value = $aws_region else . end
                )
                | .logConfiguration.options."awslogs-region" = $aws_region
              else . end
            )' \
            "${TASK_DEFINITION}" > task-definition.rendered.json

      - name: Build and push image
        working-directory: ./consumer
        run: |
          docker build -t "${{ steps.image.outputs.uri }}" .
          docker push "${{ steps.image.outputs.uri }}"

      - name: Render task definition
        id: render-task-definition
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.rendered.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.image.outputs.uri }}

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-definition.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          max-retries: 1
          wait-max-delay-seconds: 15
          wait-for-service-stability: true
